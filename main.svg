<svg width="850" height="460" viewBox="0 0 850 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Title Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#a5d6ff" />
    </linearGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 32px; fill: #ffffff; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 400; font-size: 14px; fill: #8b949e; }
    .card-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 700; font-size: 15px; fill: #f0f6fc; }
    .card-desc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 400; font-size: 12px; fill: #8b949e; }
    .btn-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; }
    .tag-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; font-size: 11px; fill: #8b949e; }
    .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 700; font-size: 10px; fill: #ffffff; letter-spacing: 1px; }
  </style>

  <!-- Container Box -->
  <rect width="850" height="460" rx="16" fill="url(#bgGrad)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Glow Accents -->
  <circle cx="0" cy="0" r="250" fill="#388bfd" fill-opacity="0.1" />
  <circle cx="850" cy="460" r="250" fill="#238636" fill-opacity="0.1" />

  <!-- HEADER SECTION -->
  <!-- Badge -->
  <rect x="32" y="32" width="125" height="22" rx="11" fill="#238636"/>
  <text x="94" y="46" text-anchor="middle" class="badge-text">FEATURED REPO</text>

  <!-- Brand Name -->
  <text x="170" y="49" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="20" fill="#f0f6fc">0w0 Studio</text>

  <!-- Status Pill -->
  <rect x="680" y="32" width="138" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="696" cy="46" r="4" fill="#3fb950"/>
  <text x="708" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#8b949e">Active R&amp;D Core</text>

  <line x1="32" y1="72" x2="818" y2="72" stroke="#30363d" stroke-opacity="0.6"/>

  <!-- HERO SECTION -->
  <text x="32" y="125" class="title">Architecting <tspan fill="url(#textGrad)">Cognitive Intelligence</tspan> &amp; Systems</text>
  <text x="32" y="155" class="subtitle">High-performance research lab dedicated to autonomous cognitive models,</text>
  <text x="32" y="175" class="subtitle">custom hardware engineering, and advanced systems architecture.</text>

  <!-- INFOGRAPHIC CARDS GRID -->
  <!-- Card 1 -->
  <g transform="translate(32, 210)">
    <rect width="248" height="130" rx="12" fill="url(#cardGrad)" stroke="#30363d"/>
    <text x="20" y="38" font-size="22">🧠</text>
    <text x="20" y="70" class="card-title">Cognitive Research</text>
    <text x="20" y="92" class="card-desc">Self-calibrating neural architectures</text>
    <text x="20" y="108" class="card-desc">&amp; autonomous frameworks.</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(301, 210)">
    <rect width="248" height="130" rx="12" fill="url(#cardGrad)" stroke="#30363d"/>
    <text x="20" y="38" font-size="22">⚡</text>
    <text x="20" y="70" class="card-title">Hardware Integration</text>
    <text x="20" y="92" class="card-desc">Custom silicon design, PCB logic,</text>
    <text x="20" y="108" class="card-desc">&amp; precise robotic control.</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(570, 210)">
    <rect width="248" height="130" rx="12" fill="url(#cardGrad)" stroke="#30363d"/>
    <text x="20" y="38" font-size="22">🛠️</text>
    <text x="20" y="70" class="card-title">Pure Engineering</text>
    <text x="20" y="92" class="card-desc">Low-latency algorithms, custom</text>
    <text x="20" y="108" class="card-desc">kernels, &amp; low-level code.</text>
  </g>

  <!-- FOOTER / CTA SECTION -->
  <line x1="32" y1="375" x2="818" y2="375" stroke="#30363d" stroke-opacity="0.6"/>

  <!-- Tags -->
  <g transform="translate(32, 395)">
    <rect width="65" height="26" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="32.5" y="17" text-anchor="middle" class="tag-text">Python</text>

    <rect x="75" width="95" height="26" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="122.5" y="17" text-anchor="middle" class="tag-text">Cognitive AI</text>

    <rect x="180" width="80" height="26" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="220" y="17" text-anchor="middle" class="tag-text">Hardware</text>
  </g>

  <!-- Buttons -->
  <g transform="translate(585, 392)">
    <!-- Secondary Button -->
    <rect x="0" y="0" width="90" height="32" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="45" y="20" text-anchor="middle" class="btn-text" fill="#c9d1d9">★ Star</text>

    <!-- Primary CTA Button -->
    <rect x="100" y="0" width="133" height="32" rx="6" fill="#238636"/>
    <text x="166" y="20" text-anchor="middle" class="btn-text">Explore Repos →</text>
  </g>
</svg>  
  <!-- Footer border -->
  <line x1="32" y1="400" x2="818" y2="400" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  
  <!-- Text elements -->
  <text x="40" y="53" font-family="Roboto, sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">FEATURED REPO</text>
  <text x="147" y="53" font-family="Roboto, sans-serif" font-size="20" font-weight="700" fill="#f0f6fc">0w0 Studio</text>
  <text x="724" y="53" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e">Active R&D Core</text>
  
  <!-- Hero title -->
  <text x="32" y="95" font-family="Roboto, sans-serif" font-size="32" font-weight="800" fill="#ffffff">Architecting</text>
  <text x="32" y="130" font-family="Roboto, sans-serif" font-size="32" font-weight="800" fill="#ffffff">Cognitive</text>
  <text x="357" y="130" font-family="Roboto, sans-serif" font-size="32" font-weight="800" fill="url(#titleGrad)">Intelligence</text>
  <text x="587" y="130" font-family="Roboto, sans-serif" font-size="32" font-weight="800" fill="#ffffff">&amp;</text>
  <text x="612" y="130" font-family="Roboto, sans-serif" font-size="32" font-weight="800" fill="#ffffff">Systems</text>
  
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5d6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hero subtitle -->
  <text x="32" y="160" font-family="Roboto, sans-serif" font-size="15" fill="#8b949e" font-weight="400">High-performance research lab dedicated to autonomous cognitive models, custom</text>
  <text x="32" y="180" font-family="Roboto, sans-serif" font-size="15" fill="#8b949e" font-weight="400">hardware engineering, and advanced systems architecture.</text>
  
  <!-- Card 1 background -->
  <rect x="32" y="200" width="254" height="160" fill="rgba(22, 27, 34, 0.7)" stroke="#30363d" stroke-width="1" rx="10"/>
  <text x="45" y="225" font-family="Roboto, sans-serif" font-size="18">🧠</text>
  <text x="45" y="245" font-family="Roboto, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Cognitive Research</text>
  <text x="45" y="263" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">Self-calibrating neural architectures &amp;</text>
  <text x="45" y="280" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">autonomous agent framework.</text>
  
  <!-- Card 2 background -->
  <rect x="308" y="200" width="254" height="160" fill="rgba(22, 27, 34, 0.7)" stroke="#30363d" stroke-width="1" rx="10"/>
  <text x="321" y="225" font-family="Roboto, sans-serif" font-size="18">⚡</text>
  <text x="321" y="245" font-family="Roboto, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Hardware Integration</text>
  <text x="321" y="263" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">Custom silicon design, embedded PCB</text>
  <text x="321" y="280" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">logic, and precise robotic control.</text>
  
  <!-- Card 3 background -->
  <rect x="584" y="200" width="254" height="160" fill="rgba(22, 27, 34, 0.7)" stroke="#30363d" stroke-width="1" rx="10"/>
  <text x="597" y="225" font-family="Roboto, sans-serif" font-size="18">🛠️</text>
  <text x="597" y="245" font-family="Roboto, sans-serif" font-size="14" font-weight="600" fill="#f0f6fc">Pure Engineering</text>
  <text x="597" y="263" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">Low-latency Python algorithms, custom</text>
  <text x="597" y="280" font-family="Roboto, sans-serif" font-size="12" fill="#8b949e" font-weight="400">kernels, and systems programming.</text>
  
  <!-- Tags -->
  <rect x="32" y="410" width="60" height="24" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="42" y="427" font-family="Roboto, sans-serif" font-size="11" fill="#8b949e">Python</text>
  
  <rect x="100" y="410" width="95" height="24" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="110" y="427" font-family="Roboto, sans-serif" font-size="11" fill="#8b949e">Cognitive AI</text>
  
  <rect x="203" y="410" width="75" height="24" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="213" y="427" font-family="Roboto, sans-serif" font-size="11" fill="#8b949e">Hardware</text>
  
  <!-- Secondary button -->
  <rect x="670" y="410" width="138" height="24" fill="#21262d" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="685" y="427" font-family="Roboto, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">⭐ Star Project</text>
  
  <!-- Primary button -->
  <rect x="720" y="410" width="98" height="24" fill="#238636" stroke="rgba(240, 246, 252, 0.1)" stroke-width="1" rx="6"/>
  <text x="730" y="427" font-family="Roboto, sans-serif" font-size="13" font-weight="600" fill="#ffffff">🚀 Explore →</text>
</svg>
